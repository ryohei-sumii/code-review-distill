name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # tree-sitter grammars enable the Layer 2 / refactor / flow tests;
          # without them those tests skip cleanly and Layer 1 still runs.
          pip install pytest \
            tree-sitter tree-sitter-typescript tree-sitter-python tree-sitter-go

      - name: Configure git (needed by the diff-based scripts)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"

      - name: Run tests
        run: python -m pytest tests/ -q
